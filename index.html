<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game UI Motion Portfolio</title>
    <style>
        :root { --accent-color: #007aff; }
        body { background: #080808; color: #fff; font-family: "PingFang SC", sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 导航栏 */
        .nav-container { text-align: center; padding: 20px; background: rgba(8,8,8,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .nav-main, .nav-sub { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .nav-sub { display: none; flex-wrap: wrap; }
        .btn { background: none; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn:hover { border-color: var(--accent-color); color: #fff; }
        .btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); font-weight: bold; }

        /* 内容区 */
        .content-wrapper { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        /* 核心网格：强制一行两个，解决重叠问题 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            display: none; 
        }

        .item { 
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 14px; 
            background: #121212; 
            overflow: hidden; 
            border: 1px solid #222; 
            cursor: pointer; 
            position: relative;
            transition: transform 0.3s ease;
        }
        .item:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .item.hidden { display: none; }
        
        video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }

        /* PDF 预览 */
        #pdf-viewer { width: 100%; height: 85vh; border-radius: 16px; overflow: hidden; border: 1px solid #333; display: block; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="nav-container">
    <div class="nav-main">
        <button class="btn active" id="intro-btn" onclick="showPDF(this)">个人简介</button>
        <button class="btn" onclick="showMain('kachi', this)">卡池</button>
        <button class="btn" onclick="showMain('lianming', this)">联名</button>
    </div>
    <div id="sub-kachi" class="nav-sub">
        <button class="btn" onclick="filterSub('typeA', this)">A类大卡池</button>
        <button class="btn" onclick="filterSub('typeB', this)">B类不放回卡池</button>
        <button class="btn" onclick="filterSub('typeC', this)">C类不放回卡池</button>
    </div>
    <div id="sub-lianming" class="nav-sub">
        <button class="btn" onclick="filterSub('bear', this)">黄油小熊</button>
        <button class="btn" onclick="filterSub('dog', this)">线条小狗</button>
        <button class="btn" onclick="filterSub('horse', this)">小马宝莉</button>
        <button class="btn" onclick="filterSub('miemie', this)">喜羊羊</button>
        <button class="btn" onclick="filterSub('zhenhuanzhuan', this)">甄嬛传</button>
    </div>
</div>

<div class="content-wrapper">
    <div id="pdf-viewer"><iframe src="zuopin.pdf#toolbar=0&navpanes=0"></iframe></div>
    
    <div class="grid" id="portfolio-grid">
        <script>
            // 路径适配你当前的根目录结构
            const config = [
                {main:'kachi', sub:'typeA', path:'typeA/kachi_typeA_', count:6},
                {main:'kachi', sub:'typeB', path:'typeB/kachi_typeB_', count:8},
                {main:'kachi', sub:'typeC', path:'typeC/kachi_typeC_', count:6},
                {main:'lianming', sub:'bear', path:'bear/lianming_bear_', count:2},
                {main:'lianming', sub:'dog', path:'dog/lianming_dog_', count:5},
                {main:'lianming', sub:'horse', path:'horse/lianming_horse_', count:7},
                {main:'lianming', sub:'miemie', path:'miemie/lianming_miemie_', count:8},
                {main:'lianming', sub:'zhenhuanzhuan', path:'zhenhuanzhuan/lianming_zhenhuanzhuan_', count:3}
            ];
            config.forEach(group => {
                for(let i=1; i<=group.count; i++) {
                    let num = i < 10 ? '0' + i : i;
                    // 在 play() 后面加上了 catch 处理报错，并在 pause 前做了判断
                    document.write(`
                        <div class="item hidden" data-main="${group.main}" data-sub="${group.sub}">
                            <video 
                                src="${group.path}${num}.mp4" 
                                muted 
                                loop 
                                onmouseover="this.play().catch(e => {})" 
                                onmouseout="if(!this.paused) this.pause()"
                                controls>
                            </video>
                        </div>
                    `);
                }
            });
        </script>
    </div>
</div>

<script>
    function showPDF(btn) {
        setActive(btn);
        document.getElementById('pdf-viewer').style.display = 'block';
        document.getElementById('portfolio-grid').style.display = 'none';
        hideSubs();
    }

    function showMain(type, btn) {
        setActive(btn);
        document.getElementById('pdf-viewer').style.display = 'none';
        const grid = document.getElementById('portfolio-grid');
        grid.style.display = 'grid';
        hideSubs();
        document.getElementById('sub-' + type).style.display = 'flex';
        
        document.querySelectorAll('.item').forEach(item => {
            item.classList.toggle('hidden', item.getAttribute('data-main') !== type);
        });
    }

    function filterSub(sub, btn) {
        document.querySelectorAll('.nav-sub .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.item').forEach(item => {
            item.classList.toggle('hidden', item.getAttribute('data-sub') !== sub);
        });
    }

    function setActive(btn) {
        document.querySelectorAll('.nav-main .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function hideSubs() {
        document.querySelectorAll('.nav-sub').forEach(s => s.style.display = 'none');
    }
</script>
</body>
</html>
